# Phase 0 单 service:FastAPI 启动后既跑 API 又托管前端 dist。
# 见 ADR-17 / §8.1。
#
# 部署模式(默认走镜像拉取, 不在服务器上构建):
#   - 默认 image 指向腾讯云 TCR 个人版镜像, 国内轻量云内网秒拉。
#   - .env 里 APP_IMAGE 可覆盖默认镜像地址 / tag, 例如固定版本:
#       APP_IMAGE=ccr.ccs.tencentyun.com/quantforge/quantforge:sha-<commit>
#   - 想在服务器本地 build 时(.env 置空 APP_IMAGE):
#       APP_IMAGE= docker compose up -d --build
#   - 想用 ghcr.io 公开镜像(国外/海外服务器):
#       APP_IMAGE=ghcr.io/chiyoumask/quantforge:latest
#   TCR 配置见 docs/deploy-tcr.md
services:
  app:
    image: ${APP_IMAGE:-ccr.ccs.tencentyun.com/quantforge/quantforge:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BACKEND_EXTRAS: ${BACKEND_EXTRAS:-}
    container_name: quantforge
    # image 存在则直接拉取运行; 缺失或想重建时用 `docker compose build` / `--build`
    pull_policy: missing
    ports:
      - "${PORT:-3018}:3018"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./tiers.yaml:/app/tiers.yaml:ro
    restart: unless-stopped
